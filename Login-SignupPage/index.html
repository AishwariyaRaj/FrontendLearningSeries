<html>

<head>
    <title>Frontend Learning </title>
</head>

<link rel="stylesheet" href="./style.css">

<body>

    <div class="login">

        <h1>LOGIN</h1>
        <form>

            <label for="username">USERNAME : </label>
            <input type="text" id="username" name="username" required class="usernameinput"><br><br><br>

            <label for="password">PASSWORD :</label>
            <input type="password" id="password" name="password" required class="passwordinput"><br><br><br>

            <button type="submit" class="login-button" onclick="alertmessage(); return false;">Login</button>

            <p class="login-text">Don't have an account?
                <a href="register.html">Register here</a>
            </p>

        </form>
    </div>


    <script src="./scripts.js"></script>
</body>

</html>
